version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch:
        update-types: ["patch"]
      minor:
        update-types: ["minor"]
      tui:
        patterns:
          - "ratatui"
          - "crossterm"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
